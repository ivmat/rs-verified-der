name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel; rustup honours it. Add the lint components.
      - name: Add rustfmt + clippy
        run: rustup component add clippy
      - name: Doc gate
        run: |
          python3 gates/check_links.py
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # The Kani proof floor is SHARDED across runners by module. Two reasons:
  #  1. GitHub's standard runner has ~7 GB RAM. A single `cargo kani` run peaks well above
  #     that on the heaviest harnesses (see the heavy tier below), so it OOM-kills the job.
  #  2. Sharding also parallelises the multi-minute proof floor.
  # Each shard selects harnesses by fully-qualified-name substring (`--harness <module>::`).
  # This matrix covers the 135 harnesses whose peak memory fits a 7 GB runner. The remaining
  # 25 (the heavy tier) are verified locally via ./check.sh — see `kani-heavy` below and README.
  kani:
    name: kani (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: codecs-a
            filters: >-
              --harness restricted_string:: --harness generalized_time::
              --harness utc_time:: --harness big_integer::
              --harness integer:: --harness length::
          - shard: codecs-b
            filters: >-
              --harness bit_string:: --harness tag:: --harness octet_string::
              --harness tlv:: --harness oid:: --harness enumerated::
              --harness boolean:: --harness null:: --harness context_tag::
              --harness x509_algorithm_identifier:: --harness x509_spki::
              --harness x509_validity::
          - shard: utf8
            filters: "--harness utf8_string::"
    steps:
      - uses: actions/checkout@v4
      - name: Run Kani (${{ matrix.shard }})
        uses: model-checking/kani-github-action@v1
        with:
          # Match the crate's pinned Kani (see PROOF_MANIFEST.md).
          kani-version: '0.67.0'
          args: "-Z stubbing ${{ matrix.filters }}"

  # Heavy tier — proofs whose CBMC peak exceeds a 7 GB runner (measured on 16-core/29 GB):
  #   set_of::* , sequence::* , x509_certificate , x509_tbs_certificate , x509_extension (~20 GB),
  #   and x509_name (modular: validate_rdn lemma ~17 GB + a cheap validate_name stub — see DECISIONS.md
  #   D26; the monolithic proof was >100 GB, now split so both pieces fit a normal machine).
  # These are NOT run on GitHub's standard runners (they OOM). ALL of them are verified locally by
  # ./check.sh — the same local-milestone treatment as the L4 Lean lids.
  # To run them in CI, provide a large-memory runner (self-hosted or a GitHub larger runner, ~24 GB+)
  # and enable the job below.
  #
  # kani-heavy:
  #   name: kani (heavy, needs >=24 GB RAM)
  #   runs-on: [self-hosted, linux, x64]   # or a GitHub larger-runner label
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: model-checking/kani-github-action@v1
  #       with:
  #         kani-version: '0.67.0'
  #         args: >-
  #           -Z stubbing --harness set_of:: --harness sequence::
  #           --harness x509_name:: --harness x509_tbs_certificate::
  #           --harness x509_certificate:: --harness x509_extension::
